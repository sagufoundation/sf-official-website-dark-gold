    .nav-link::after { content:''; position:absolute; left:0; bottom:-3px; width:0; height:2px; background:#e6a817; transition:width .3s ease; }

    .topbar-link { position:relative; }

    .topbar-link:hover::after { width:100%; }

           get filtered() {

             return this.members.filter(m => m.cats.includes(this.activeTab));
           }

      <!-- Tabs -->
      <div class="flex flex-wrap justify-center gap-3 mb-10">
        <template x-for="tab in tabs" :key="tab.key">
          <button 
            @click="activeTab = tab.key"
            :class="activeTab === tab.key 
              ? 'bg-[#0a0a0a] text-white shadow-md' 
              : 'bg-white border border-gray-300 hover:border-[#e6a817] text-gray-700'"
            class="px-6 py-3 rounded-2xl text-sm font-semibold transition-all whitespace-nowrap">
            <span x-text="tab.label"></span>
          </button>
        </template>
      </div>

      <!-- Count -->
      <p class="text-center text-sm text-gray-500 mb-10">
        Showing <span class="font-semibold text-[#0a0a0a]" x-text="filtered.length"></span> member<span x-show="filtered.length !== 1">s</span>
      </p>

      <!-- Team Grid -->
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-4 gap-6">
        <template x-for="(member, i) in filtered" :key="member.name">
          <div class="group bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-300">
            
            <!-- Photo -->
            <div class="relative overflow-hidden">
              <img :src="member.img" 
                   :alt="member.name"
                   class="w-full aspect-square object-cover transition-transform duration-500 group-hover:scale-105">

              <!-- Hover Overlay -->
              <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/30 to-transparent opacity-0 group-hover:opacity-100 transition-all duration-300 flex items-end justify-center pb-6 gap-4">
                
                <!-- LinkedIn -->
                <a :href="member.linkedin" 
                   target="_blank"
                   class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center text-[#0a0a0a] hover:bg-[#e6a817] hover:text-white transition-all shadow-lg">
                  <i class="fa-brands fa-linkedin text-xl"></i>
                </a>

                <!-- Email -->
                <a :href="`mailto:${member.email}`" 
                   class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center text-[#0a0a0a] hover:bg-[#e6a817] hover:text-white transition-all shadow-lg">
                  <i class="fa-solid fa-envelope text-xl"></i>
                </a>
              </div>
            </div>

            <!-- Info -->
            <div class="p-5 text-center">
              <h3 class="font-bold text-[#0a0a0a] text-[15px] leading-tight" x-text="member.name"></h3>
            </div>
          </div>
        </template>
      </div>

    <!-- Call to Action: Join Our Programs -->
    <div class="mt-20 bg-[#0a0a0a] text-white rounded-3xl p-12 md:p-16 text-center">

      <a href="courses.html" class="inline-flex items-center gap-3 bg-[#e6a817] hover:bg-amber-400 text-[#0a0a0a] font-bold px-10 py-5 rounded-2xl transition-all">
